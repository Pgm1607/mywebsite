<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Web Cá Nhân</title>
</head>

<body>

    <!-- Thẻ ngữ nghĩa 1 -->
    <header>
        <h1>Trang web của Minh</h1>
        <p>Giới thiệu về sở thích và hình ảnh yêu thích</p>
    </header>

    <!-- Thẻ ngữ nghĩa 2 -->
    <main>

        <section>
            <h2>Sở thích</h2>
            <ul>
                <li>Lập trình</li>
                <li>Nghe nhạc</li>
                <li>Du lịch</li>
            </ul>
        </section>

        <section>
            <h2>Hình ảnh</h2>
            
            <img src="1.jpg" alt="Ảnh 1">
            <img src="2.jpg" alt="Ảnh 2">
            <img src="3.jpg" alt="Ảnh 3">

        </section>

        <section>
            <h2>Liên kết</h2>
            <p>
                Truy cập 
                <a href="https://vi.wikipedia.org/wiki/One_Piece" target="_blank">
                    OnePiece
                </a>
                để tìm hiểu thêm.
            </p>
        </section>

    </main>

    <!-- Thẻ ngữ nghĩa 3 -->
    <footer>
        <p>&copy; 2026 Minh</p>
    </footer>

</body>
</html>
